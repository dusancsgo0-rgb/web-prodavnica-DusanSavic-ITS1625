<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Fashion - Proizvodi</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }

        header {
            background-color: black;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: #1a1a1a;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: gray;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .product {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
        }

        .product img {
            width: 100%;
            border-radius: 8px;
        }

        .price {
            margin-top: 10px;
            font-weight: bold;
            color: #00ffcc;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background-color: black;
            text-align: center;
        }
    </style>
</head>

<body>

<header>
    <h1>DS FASHION</h1>
</header>

<nav>
    <a href="index.html">Početna</a>
    <a href="proizvodi.html">Proizvodi</a>
    <a href="#">O nama</a>
    <a href="#">Kontakt</a>
</nav>

<div class="container">
    <h2>Naši proizvodi</h2>
    <p>Pregled muške streetwear kolekcije</p>

    <div class="grid">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Duks">
            <h3>Duks DS Basic</h3>
            <div class="price">29€</div>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Majica">
            <h3>Majica Street</h3>
            <div class="price">15€</div>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Jakna">
            <h3>Jakna Winter Pro</h3>
            <div class="price">59€</div>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Patike">
            <h3>DS Sneakers</h3>
            <div class="price">79€</div>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 DS FASHION - Sva prava zadržana</p>
</footer>

</body>
</html>
