<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Fashion - Muška Garderoba</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: #1a1a1a;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: gray;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: url('https://images.unsplash.com/photo-1520975916090-3105956dac38') no-repeat center/cover;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
        }

        .products {
            padding: 40px;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #000;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>DS FASHION</h1>
</header>

<nav>
    <a href="#">Početna</a>
    <a href="#">Shop</a>
    <a href="#">O nama</a>
    <a href="#">Kontakt</a>
</nav>

<section class="hero">
    <h2>Muška Moda</h2>
    <p>Najnovija streetwear kolekcija</p>
</section>

<section class="products">
    <h2>Istaknuti proizvodi</h2>

    <div class="product-grid">
        <div class="product">Duks - 29€</div>
        <div class="product">Majica - 15€</div>
        <div class="product">Jakna - 59€</div>
        <div class="product">Patike - 79€</div>
    </div>
</section>

<footer>
    <p>© 2026 DS FASHION. Sva prava zadržana.</p>
</footer>

</body>
</html>
